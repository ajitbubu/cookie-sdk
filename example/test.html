<!doctype html>
<html lang="en">

<head>

     .cookie-settings-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: 1px solid #ddd;
  background: #fff;

  border-radius: 999px;
  padding: 8px 14px;
  font-size: 14px;
  cursor: pointer;
}

</body>

</html>
